# Workflow de despliegue a GitHub Pages.
# Construye el frontend (Vite) con el base path del repositorio y publica el
# contenido estático en GitHub Pages en cada push a la rama main.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos requeridos por el despliegue oficial de Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues concurrentes que se pisen entre sí.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configurar y habilitar GitHub Pages
        uses: actions/configure-pages@v4
        with:
          # Habilita Pages automáticamente vía API si aún no está activo.
          enablement: true

      - name: Instalar dependencias
        run: npm ci

      - name: Construir frontend (base path de GitHub Pages)
        run: npx vite build
        env:
          GH_PAGES: 'true'

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
